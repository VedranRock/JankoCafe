<!DOCTYPE html>
<html lang="sr">

<head>
    <meta charset="UTF-8">
    <title>Cafe Order Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>Cafe Order Tracker</h1>
    </header>

    <main>
        <!-- Table Selection Page -->
        <section id="tables-page">
            <h2>Izaberi sto</h2>
            <div class="table-grid">
                <!-- Tables generated by JS -->
            </div>
        </section>

        <!-- Menu Page -->
        <section id="menu-page" class="hidden">
            <button id="back-button">← Nazad</button>
            <h2 id="table-title"></h2>

            <!-- Drinks Section -->
            <h3>Piće</h3>
            <div class="menu-grid" id="menu-drinks"></div>

            <!-- Food Section -->
            <h3>Hrana</h3>
            <div class="menu-grid" id="menu-food"></div>

            <!-- Order Summary -->
            <section id="order">
                <h2>Porudžbina</h2>
                <ul id="order-list"></ul>
                <p id="total">Ukupno: 0€</p>
                <button id="reset-order">Resetuj porudžbinu</button>
            </section>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
